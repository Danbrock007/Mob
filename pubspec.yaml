name: pet_trade_innovations
description: Pet Trade Innovations Premium WooCommerce POS
publish_to: "none"
version: 1.3.0+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  html: ^0.15.6
  image_picker: ^1.1.2
  flutter_local_notifications: ^18.0.1
  pdf: ^3.11.1
  printing: ^5.13.4
  screenshot: ^3.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app-icon.png"
  adaptive_icon_background: "#222222"
  adaptive_icon_foreground: "assets/app-icon.png"
